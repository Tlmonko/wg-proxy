services:
  wg:
    image: linuxserver/wireguard:version-v1.0.20210914
    container_name: wg
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Moscow}
    cap_add:
      - SYS_MODULE
      - NET_ADMIN
    ports:
      - 51820:51820/udp
      - 51820:51820/tcp
      - 443:443/tcp
    volumes:
      - ./config:/config
      - ./clients:/clients
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

  wg-bot:
    image: ghcr.io/tlmonko/wg-proxy/wg-bot:latest
    container_name: wg-bot
    restart: always
    depends_on:
      - wg
    env_file:
      - .env
    volumes:
      - ./config:/config
      - ./clients:/clients
      - ./bot-data:/data
    network_mode: "service:wg"
    cap_add:
      - NET_ADMIN

  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt
    restart: always
    depends_on:
      - wg
    environment:
      - RUST_LOG=${TELEMT_LOG_LEVEL:-info}
    volumes:
      - ./config/telemt.toml:/etc/telemt.toml:ro
    network_mode: "service:wg"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m

