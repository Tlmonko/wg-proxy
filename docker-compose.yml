services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped

  vpn-bot-server:
    container_name: vpn-bot-server
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BOT_REPO: ${BOT_REPO:-https://github.com/WoodieDudy/wg-vpn-tg-bot.git}
        BOT_REF: ${BOT_REF:-main}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      # --- Bot env ---
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      BOT_HTTP_PORT: ${BOT_HTTP_PORT:-8081}
      # Required by wg-vpn-tg-bot webhook mode
      WEBHOOK_HOST: ${WEBHOOK_HOST}
      # Optional pass-through webhook vars (set in .env if needed)
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8081}
      # Common listen-host env names used by webhook bots/frameworks.
      WEBHOOK_LISTEN_HOST: ${WEBHOOK_LISTEN_HOST:-0.0.0.0}
      WEBAPP_HOST: ${WEBAPP_HOST:-0.0.0.0}
      APP_HOST: ${APP_HOST:-0.0.0.0}

      # --- WireGuard server in container #1 ---
      WG_SERVER_INTERFACE: ${WG_SERVER_INTERFACE:-wg0}
      WG_SERVER_PORT: ${WG_SERVER_PORT:-51820}
      WG_SERVER_SUBNET: ${WG_SERVER_SUBNET:-10.66.0.0/24}
      WG_SERVER_ADDRESS: ${WG_SERVER_ADDRESS:-10.66.0.1/24}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY}

      # Route user subnet from container #1 to container #2
      WG_CLIENT_GATEWAY_IP: ${WG_CLIENT_GATEWAY_IP:-172.30.0.2}
      WG_CLIENT_EGRESS_IFACE: ${WG_CLIENT_EGRESS_IFACE:-}
    ports:
      - "${WG_SERVER_PORT:-51820}:${WG_SERVER_PORT:-51820}/udp"
    volumes:
      - ./config/wg-server:/etc/wireguard
      - ./scripts/container1-entrypoint.sh:/usr/local/bin/container1-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/container1-entrypoint.sh"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.vpn-bot.rule=Host(`${TRAEFIK_BOT_HOST}`)
      - traefik.http.routers.vpn-bot.entrypoints=websecure
      - traefik.http.routers.vpn-bot.tls=true
      - traefik.http.routers.vpn-bot.tls.certresolver=letsencrypt
      - traefik.http.services.vpn-bot.loadbalancer.server.port=${BOT_HTTP_PORT:-8081}
    networks:
      transit:
        ipv4_address: 172.30.0.10
      proxy:
    depends_on:
      - wg-egress-client
      - traefik
    restart: unless-stopped

  wg-egress-client:
    image: alpine:3.20
    container_name: wg-egress-client
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      WG_CLIENT_INTERFACE: ${WG_CLIENT_INTERFACE:-wg-egress}
      WG_SERVER_SUBNET: ${WG_SERVER_SUBNET:-10.66.0.0/24}
    volumes:
      - ${WG_CLIENT_CONFIG_PATH:-./config/wg-client/wg-egress.conf}:/etc/wireguard/${WG_CLIENT_INTERFACE:-wg-egress}.conf:ro
      - ./scripts/container2-entrypoint.sh:/usr/local/bin/container2-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/container2-entrypoint.sh"]
    networks:
      transit:
        ipv4_address: 172.30.0.2
    restart: unless-stopped

networks:
  transit:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  proxy:
    driver: bridge
