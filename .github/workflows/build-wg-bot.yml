name: Build and publish wg-bot image

on:
  push:
    branches:
      - main
    paths:
      - 'bridge/bot/**'
      - '.github/workflows/build-wg-bot.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE=ghcr.io/tlmonko/wg-proxy/wg-bot
          SHA_TAG=${GITHUB_SHA::7}

          docker build -f bridge/bot/Dockerfile -t "$IMAGE:latest" -t "$IMAGE:$SHA_TAG" bridge/bot
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"
